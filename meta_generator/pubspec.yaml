name: meta_generator
description: Generates metadata classes (FooMeta) with field and method enums for annotated Dart classes. Compatible with freezed.
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  analyzer: '>=12.0.0 <13.0.0'
  build: '>=4.0.0 <5.0.0'
  source_gen: '>=4.0.0 <5.0.0'

dev_dependencies:
  build_runner: ^2.4.0
  build_test: ^3.0.0
  test: ^1.24.0
